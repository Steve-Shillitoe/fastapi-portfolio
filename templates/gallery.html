<!DOCTYPE html>
<html>
<head>
    <title>Art Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            border-radius: 5px;
        }
        .image-wrapper {
            height: 100%;
            width: auto;
            overflow: hidden;
        }
        .image-wrapper img {
            height: 100%;
            width: auto;
            max-width: 100%;
        }
        h3 {
            margin: 10px 0 5px;
        }
        p {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<h1 style="text-align:center;">My Art Portfolio</h1>
<form method="get"  action="/"  style="text-align:center; margin-bottom:30px;">

    <input
        type="text"
        name="tag"
        placeholder="Search by tag..."
        value="{{ tag or '' }}"
        style="padding:8px; width:250px;"
    >

    <button type="submit" style="padding:8px 15px;">
        Search
    </button>

    {% if tag %}
        <a href="/artworks/gallery" style="margin-left:15px;">
            Clear
        </a>
    {% endif %}

</form>
<div class="gallery">
    {% for art in artworks %}
        <div class="card">
            <img 
                src="{{ art.image_url }}" 
                alt="{{ art.title }}"
                onclick="openLightbox('{{ art.image_url }}')"
                style="cursor:pointer;">
            <h3>{{ art.title }}</h3>
            <p>{{ art.comments }}</p>
        </div>
    {% endfor %}
</div>
<div style="text-align:center; margin: 20px;">
    {% if page > 1 %}
        <a href="/?page={{ page - 1 }}">⬅ Previous</a>
    {% endif %}

    <span style="margin: 0 15px;">
        Page {{ page }} of {{ total_pages }}
    </span>

    {% if page < total_pages %}
        <a href="/?page={{ page + 1 }}">Next ➡</a>
    {% endif %}
</div>
<div id="lightbox" 
     onclick="closeLightbox()"
     style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.9);
        justify-content:center;
        align-items:center;
        z-index:1000;
     ">
    <img id="lightbox-img" 
         style="max-width:90%; max-height:90%;">
</div>
<div id="lightbox" 
     onclick="closeLightbox()"
     style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.9);
        justify-content:center;
        align-items:center;
        z-index:1000;
     ">
    <img id="lightbox-img" 
         style="max-width:90%; max-height:90%;">
</div>

<div id="lightbox" 
     onclick="closeLightbox()"
     style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.9);
        justify-content:center;
        align-items:center;
        z-index:1000;
     ">
    <img id="lightbox-img" 
         style="max-width:90%; max-height:90%;">
</div>
<script>
    function openLightbox(src) {
        document.getElementById("lightbox-img").src = src;
        document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
    }
</script>
</body>
</html>
